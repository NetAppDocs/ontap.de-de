---
indexpage:
  title: ONTAP 9 Dokumentation
  summary: NetApp ONTAP, die branchenführende Datenmanagement-Software, bringt die
    Einfachheit und Flexibilität der Cloud in Ihr Rechenzentrum und bringt alle Enterprise-Funktionen
    Ihres Rechenzentrums in die Public Cloud. Die Informationen auf dieser Website
    bieten Unterstützung bei der Einrichtung oder Aktualisierung von ONTAP, der Bereitstellung
    von Speicher für Clients sowie beim Schutz und der Verwaltung Ihrer Daten mit
    System Manager oder der ONTAP CLI.
